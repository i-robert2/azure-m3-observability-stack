# Grafana data sources for Loki + Tempo, auto-loaded by kube-prometheus-stack's
# Grafana sidecar (it watches ConfigMaps labeled grafana_datasource=1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-extra-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-tempo-datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        uid: loki
        url: http://loki-read.loki.svc.cluster.local:3100
        jsonData:
          timeout: 60
      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://tempo.tempo.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
