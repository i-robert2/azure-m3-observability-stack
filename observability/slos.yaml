# SLOs as code for notes-api. Documentation/intent artifact; the burn-rate alerts in
# alerts.yaml enforce the availability objective. (Sloth/Pyrra could generate rules from this.)
service: notes-api
slos:
  - name: availability
    objective: 99 # % of non-5xx requests over 28d
    indicator:
      good: 'sum(rate(http_server_duration_milliseconds_count{job="notes-api",http_status_code!~"5.."}[28d]))'
      total: 'sum(rate(http_server_duration_milliseconds_count{job="notes-api"}[28d]))'

  - name: read_latency_p95
    objective: 99 # % of GET requests served < 100ms
    indicator:
      good: 'sum(rate(http_server_duration_milliseconds_bucket{job="notes-api",http_method="GET",le="100"}[28d]))'
      total: 'sum(rate(http_server_duration_milliseconds_count{job="notes-api",http_method="GET"}[28d]))'

  - name: write_latency_p95
    objective: 99 # % of POST requests served < 300ms (nearest histogram bucket le=250ms)
    indicator:
      good: 'sum(rate(http_server_duration_milliseconds_bucket{job="notes-api",http_method="POST",le="250"}[28d]))'
      total: 'sum(rate(http_server_duration_milliseconds_count{job="notes-api",http_method="POST"}[28d]))'
