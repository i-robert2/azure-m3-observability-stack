# Loki (SimpleScalable) with Azure Blob chunk storage.
# Placeholders REPLACE_LOKI_SA / REPLACE_LOKI_KEY are filled at install time into a
# *.rendered.yaml file (gitignored — it contains the storage key).

deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: azure
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: azure
    bucketNames:
      chunks: loki-chunks
      ruler: loki-chunks
      admin: loki-chunks
    azure:
      account_name: REPLACE_LOKI_SA
      account_key: REPLACE_LOKI_KEY
      container_name: loki-chunks
      use_managed_identity: false
  limits_config:
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    reject_old_samples: false

backend: { replicas: 1 }
read: { replicas: 1 }
write: { replicas: 1 }
gateway: { enabled: false }
chunksCache: { enabled: false }
resultsCache: { enabled: false }
lokiCanary: { enabled: false }
test: { enabled: false }
